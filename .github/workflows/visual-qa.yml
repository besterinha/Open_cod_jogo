name: Visual QA

on:
  workflow_run:
    workflows: ["CI — Test Suite"]
    types:
      - completed
    branches: [main, master]
  workflow_dispatch:

jobs:
  visual-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: firebelley/setup-godot@v2
        with:
          godot-version: 4.5.stable
          templates: true

      - name: Export Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: visual_tests/package-lock.json

      - name: Install dependencies
        run: |
          cd visual_tests
          npm ci

      - name: Install Playwright browsers
        run: |
          cd visual_tests
          npx playwright install --with-deps chromium

      - name: Create screenshots directory
        run: mkdir -p visual_tests/screenshots

      - name: Start web server
        run: |
          npx serve build/web -p 8080 &
          sleep 3
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8080

      - name: Run Visual Tests
        run: |
          cd visual_tests
          npm run test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:8080

      - name: Stop web server
        if: always()
        run: kill $(lsof -t -i:8080) 2>/dev/null || true

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-screenshots
          path: visual_tests/screenshots/
          retention-days: 7

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: visual_tests/playwright-report/
          retention-days: 7
